[settings]
experimental = true
lockfile = true

[tools]
# https://developer.rebble.io/sdk/
# https://github.com/coredevices/pebble-tool
# https://mise.jdx.dev/dev-tools/backends/pipx.html
"pipx:pebble-tool" = "5.0.28"

[env]
_.file = ".env"

[tasks.prepare-package]
description = "Prepare release package.json"
run = "scripts/prepare-package.sh release"

[tasks.prepare-package-dev]
description = "Prepare dev package.json"
run = "scripts/prepare-package.sh dev"

[tasks.clean]
description = "Clean build artifacts"
run = "pebble clean"

[tasks.build]
description = "Build PBW"
depends = ["prepare-package"]
run = "pebble build"
sources = [
  "wscript",
  "package.template.json",
  "profiles/package.release.json",
  "package-lock.json",
  "src/**/*",
  "resources/**/*",
]
outputs = ["build/**/*.pbw"]

[tasks.rebuild]
description = "Clean and rebuild PBW"
depends = ["prepare-package"]
run = "pebble clean && pebble build"

[tasks.build-dev]
description = "Build dev PBW"
depends = ["prepare-package-dev"]
run = "pebble build && cp build/forecaswatch2.pbw build/forecaswatch2-dev.pbw"
sources = [
  "wscript",
  "package.template.json",
  "profiles/package.dev.json",
  "package-lock.json",
  "src/**/*",
  "resources/**/*",
]
outputs = ["build/forecaswatch2-dev.pbw"]

[tasks.rebuild-dev]
description = "Clean and rebuild dev PBW"
depends = ["prepare-package-dev"]
run = "pebble clean && pebble build && cp build/forecaswatch2.pbw build/forecaswatch2-dev.pbw"

[tasks.install-phone]
description = "Build and install on phone"
alias = "install"
depends = ["build"]
usage = '''
arg "<ip>" env="IP" help="Phone IP address"
'''
run = "pebble install --phone ${usage_ip?}"

[tasks.install-phone-dev]
description = "Build dev and install on phone"
depends = ["build-dev"]
usage = '''
arg "<ip>" env="IP" help="Phone IP address"
'''
run = "pebble install build/forecaswatch2-dev.pbw --phone ${usage_ip?}"

[tasks.install-emulator]
description = "Build and install on basalt emulator"
usage = '''
arg "[profile]"
arg "[pebble_args]" var=#true double_dash="optional"
'''
run = '''
eval "pebble_args=(${usage_pebble_args:-})"
args=()
if [[ -n "${usage_profile:-}" ]]; then
  args+=("${usage_profile}")
fi
if [[ -n "${usage_pebble_args:-}" ]]; then
  args+=("--" "${pebble_args[@]}")
fi
scripts/install-emulator.sh "${args[@]}"
'''
