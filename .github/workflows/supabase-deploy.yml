# Deploys migrations + Edge Functions to the linked Supabase project on merge to main.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN — https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_ID   — project ref from dashboard URL …/project/<ref>
#   SUPABASE_DB_PASSWORD  — Database password (Project Settings → Database)
#
# See: https://supabase.com/docs/guides/cli/managing-environments
name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - 'mise.toml'
      - 'mise.lock'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: github.repository == 'mattrossman/forecaswatch2'
    runs-on: ubuntu-24.04
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
      - run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
      - run: supabase db push --yes
      - run: supabase functions deploy
